<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 640" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- title -->
  <text x="35" y="44" font-size="25" font-weight="700" fill="#0f172a">Horizon repair pipeline &#8212; stage internals</text>
  <text x="35" y="70" font-size="14" fill="#64748b">Everything below runs inside run_horizon() (horizon/horizon.py). Left &#8594; right = order of execution.</text>

  <!-- connector arrows between column headers (y = 128) -->
  <line x1="285" y1="128" x2="303" y2="128" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow2)"/>
  <line x1="555" y1="128" x2="573" y2="128" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow2)"/>
  <line x1="825" y1="128" x2="843" y2="128" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow2)"/>
  <line x1="1095" y1="128" x2="1113" y2="128" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow2)"/>

  <!-- ============ Column 1: Inputs ============ -->
  <g>
    <rect x="35" y="100" width="250" height="470" rx="12" fill="#ffffff" stroke="#4f46e5" stroke-width="1.6"/>
    <path d="M35,112 a12,12 0 0 1 12,-12 h226 a12,12 0 0 1 12,12 v34 h-250 z" fill="#4f46e5"/>
    <text x="160" y="131" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">1 &#183; Inputs</text>
    <text x="55" y="185" font-size="13.5" fill="#334155">&#8226; dirty table (csv / parquet)</text>
    <text x="55" y="217" font-size="13.5" fill="#334155">&#8226; FDs (fds.csv / fds.txt)</text>
    <text x="55" y="249" font-size="13.5" fill="#334155">&#8226; all cells read as strings</text>
    <text x="55" y="281" font-size="13.5" fill="#334155">&#8226; streamed in batches (8&#160;MB)</text>
    <line x1="55" y1="505" x2="265" y2="505" stroke="#e2e8f0" stroke-width="1"/>
    <text x="55" y="528" font-size="12.5" font-weight="600" fill="#4f46e5">load_fds()</text>
    <text x="55" y="547" font-size="12.5" font-weight="600" fill="#4f46e5">iter_table_batches()</text>
    <text x="55" y="562" font-size="11" fill="#94a3b8">utils/loaders.py</text>
  </g>

  <!-- ============ Column 2: Order FDs ============ -->
  <g>
    <rect x="305" y="100" width="250" height="470" rx="12" fill="#ffffff" stroke="#0891b2" stroke-width="1.6"/>
    <path d="M305,112 a12,12 0 0 1 12,-12 h226 a12,12 0 0 1 12,12 v34 h-250 z" fill="#0891b2"/>
    <text x="430" y="131" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">2 &#183; Order FDs  &#167;4&#8211;5.1</text>
    <text x="325" y="185" font-size="13.5" fill="#334155">&#8226; build attribute FD graph</text>
    <text x="325" y="217" font-size="13.5" fill="#334155">&#8226; condense &#8594; SCC graph (Tarjan)</text>
    <text x="325" y="249" font-size="13.5" fill="#334155">&#8226; topological sort (Kahn)</text>
    <text x="325" y="281" font-size="13.5" fill="#334155">&#8226; in-degree 0 &#8594; bound attrs</text>
    <text x="325" y="313" font-size="13.5" fill="#334155">&#8226; set fd.order + fd.cyclic</text>
    <line x1="325" y1="505" x2="535" y2="505" stroke="#e2e8f0" stroke-width="1"/>
    <text x="325" y="528" font-size="12.5" font-weight="600" fill="#0891b2">get_ordered_fds()</text>
    <text x="325" y="547" font-size="11" fill="#94a3b8">static_fd_analysis.py</text>
    <text x="325" y="565" font-size="11.5" fill="#64748b" font-style="italic">&#8594; traversal order</text>
  </g>

  <!-- ============ Column 3: FD Pattern Graph ============ -->
  <g>
    <rect x="575" y="100" width="250" height="470" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="1.6"/>
    <path d="M575,112 a12,12 0 0 1 12,-12 h226 a12,12 0 0 1 12,12 v34 h-250 z" fill="#7c3aed"/>
    <text x="700" y="131" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">3 &#183; Pattern Graph  &#167;3.2&#8211;3.3</text>
    <text x="595" y="185" font-size="13.5" fill="#334155">&#8226; 1 pass: count pattern support</text>
    <text x="595" y="217" font-size="13.5" fill="#334155">&#8226; nodes = (column, value)</text>
    <text x="595" y="249" font-size="13.5" fill="#334155">&#8226; edges scored by quality</text>
    <text x="595" y="281" font-size="12.5" fill="#334155">&#8226; quality =</text>
    <text x="610" y="301" font-size="12.5" fill="#334155">(sup + &#931; downstream) / (reach+1)</text>
    <text x="595" y="333" font-size="13.5" fill="#334155">&#8226; drop singletons;</text>
    <text x="610" y="353" font-size="13.5" fill="#334155">cyclic &#8594; back-edges</text>
    <line x1="595" y1="505" x2="805" y2="505" stroke="#e2e8f0" stroke-width="1"/>
    <text x="595" y="528" font-size="12.5" font-weight="600" fill="#7c3aed">FDPatternGraph</text>
    <text x="595" y="547" font-size="11" fill="#94a3b8">fd_pattern_graph.py</text>
    <text x="595" y="565" font-size="11.5" fill="#64748b" font-style="italic">&#8594; supported = frequent</text>
  </g>

  <!-- ============ Column 4: Repair Tuples ============ -->
  <g>
    <rect x="845" y="100" width="250" height="470" rx="12" fill="#ffffff" stroke="#ea580c" stroke-width="1.6"/>
    <path d="M845,112 a12,12 0 0 1 12,-12 h226 a12,12 0 0 1 12,12 v34 h-250 z" fill="#ea580c"/>
    <text x="970" y="131" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">4 &#183; Repair Tuples  &#167;5.2</text>
    <text x="865" y="181" font-size="13" fill="#64748b" font-style="italic">per tuple, per FD in order &#8212;</text>
    <text x="865" y="200" font-size="13" fill="#64748b" font-style="italic">choose the RHS value:</text>
    <text x="865" y="234" font-size="13.5" fill="#334155">1) cached repair-table hit</text>
    <text x="865" y="266" font-size="13.5" fill="#334155">2) RHS already set this tuple</text>
    <text x="865" y="298" font-size="13.5" fill="#334155">3) dropped-singleton pass-through</text>
    <text x="865" y="330" font-size="13.5" fill="#334155" font-weight="700">4) best edge = max quality</text>
    <text x="865" y="362" font-size="12.5" fill="#64748b">&#8226; batches written straight to disk</text>
    <line x1="865" y1="505" x2="1075" y2="505" stroke="#e2e8f0" stroke-width="1"/>
    <text x="865" y="528" font-size="12.5" font-weight="600" fill="#ea580c">repair_dirty_data()</text>
    <text x="865" y="547" font-size="12.5" font-weight="600" fill="#ea580c">repair_tuple()</text>
    <text x="865" y="562" font-size="11" fill="#94a3b8">horizon.py</text>
  </g>

  <!-- ============ Column 5: Output & Eval ============ -->
  <g>
    <rect x="1115" y="100" width="250" height="470" rx="12" fill="#ffffff" stroke="#16a34a" stroke-width="1.6"/>
    <path d="M1115,112 a12,12 0 0 1 12,-12 h226 a12,12 0 0 1 12,12 v34 h-250 z" fill="#16a34a"/>
    <text x="1240" y="131" font-size="15.5" font-weight="700" fill="#ffffff" text-anchor="middle">5 &#183; Output &amp; Eval  &#167;6.1</text>
    <text x="1135" y="185" font-size="13.5" fill="#334155">&#8226; cleaned_data.csv</text>
    <text x="1135" y="217" font-size="13.5" fill="#334155">&#8226; statistics.json (timings)</text>
    <text x="1135" y="249" font-size="13.5" fill="#334155">&#8226; pattern_expressions.txt</text>
    <text x="1150" y="268" font-size="12" fill="#64748b">(lineage, optional)</text>
    <line x1="1135" y1="300" x2="1345" y2="300" stroke="#e2e8f0" stroke-width="1"/>
    <text x="1135" y="330" font-size="13.5" fill="#334155">&#8226; evaluate_repair(</text>
    <text x="1150" y="349" font-size="12.5" fill="#334155">clean, dirty, cleaned)</text>
    <text x="1135" y="381" font-size="13.5" font-weight="700" fill="#14532d">&#8594; precision / recall / F1</text>
    <line x1="1135" y1="505" x2="1345" y2="505" stroke="#e2e8f0" stroke-width="1"/>
    <text x="1135" y="528" font-size="11" fill="#94a3b8">horizon.py</text>
    <text x="1135" y="546" font-size="11" fill="#94a3b8">eval/effectiveness_eval.py</text>
  </g>

  <!-- big-picture footer -->
  <text x="35" y="608" font-size="13.5" fill="#64748b">Core idea: repairs preserve the most-supported (frequent) value patterns in the data &#8212; not the minimal number of changes &#8212; all in one linear-time, streaming pass.</text>
</svg>
